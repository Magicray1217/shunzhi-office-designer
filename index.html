<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬知 Office · 啫喱风</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans SC',system-ui,sans-serif; overflow:hidden; height:100vh; background:#f0f4ff; }

  /* === JELLY PALETTE === */
  :root {
    --jelly-bg: #f0f4ff;
    --jelly-pink: #ff6b9d;
    --jelly-purple: #c471ed;
    --jelly-blue: #667eea;
    --jelly-cyan: #48dbfb;
    --jelly-green: #0abf53;
    --jelly-yellow: #ffc312;
    --jelly-orange: #f97f51;
    --jelly-red: #ee5a6f;
    --jelly-card: #ffffff;
    --jelly-text: #2d3436;
    --jelly-dim: #a0a8b4;
    --jelly-shadow: rgba(102,126,234,0.15);
  }

  /* === TOP BAR === */
  .topbar { height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 24px; background:white; box-shadow:0 2px 20px var(--jelly-shadow); z-index:100; position:relative; }
  .topbar .logo { display:flex; align-items:center; gap:10px; }
  .topbar .logo .icon { width:36px; height:36px; border-radius:12px; background:linear-gradient(135deg,var(--jelly-purple),var(--jelly-blue)); display:flex; align-items:center; justify-content:center; color:white; font-size:1.2em; box-shadow:0 4px 12px rgba(196,113,237,0.3); }
  .topbar h1 { font-size:1.2em; font-weight:900; color:var(--jelly-text); }
  .topbar h1 span { background:linear-gradient(90deg,var(--jelly-purple),var(--jelly-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .topbar .chips { display:flex; gap:10px; }
  .chip { padding:6px 14px; border-radius:20px; font-size:0.8em; font-weight:700; display:flex; align-items:center; gap:5px; }
  .chip-energy { background:linear-gradient(135deg,#fff5d4,#ffe082); color:#c49000; }
  .chip-seats { background:linear-gradient(135deg,#e8f5e9,#c8e6c9); color:#2e7d32; }
  .chip-level { background:linear-gradient(135deg,#e8eaf6,#c5cae9); color:#3949ab; }

  /* === LAYOUT === */
  .main { display:flex; height:calc(100vh - 60px); }

  /* === LEFT PANEL === */
  .panel-left { width:260px; background:white; box-shadow:4px 0 20px var(--jelly-shadow); z-index:10; display:flex; flex-direction:column; }
  .panel-header { padding:16px; font-size:0.85em; color:var(--jelly-dim); font-weight:700; border-bottom:1px solid #f0f2f5; display:flex; align-items:center; gap:6px; }
  .panel-scroll { flex:1; overflow-y:auto; padding:10px; }

  .shop-card { background:white; border:2px solid #f0f2f5; border-radius:16px; padding:14px; margin-bottom:10px; cursor:pointer; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); position:relative; }
  .shop-card:hover { transform:translateY(-4px) scale(1.02); box-shadow:0 8px 25px var(--jelly-shadow); border-color:var(--jelly-blue); }
  .shop-card:active { transform:scale(0.98); }
  .shop-card .sc-top { display:flex; align-items:center; gap:12px; }
  .shop-card .sc-avatar { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.6em; flex-shrink:0; }
  .shop-card .sc-name { font-weight:900; font-size:0.9em; color:var(--jelly-text); }
  .shop-card .sc-desc { font-size:0.72em; color:var(--jelly-dim); margin-top:2px; }
  .shop-card .sc-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .shop-card .sc-price { font-weight:900; font-size:0.85em; color:var(--jelly-orange); }
  .sc-badge { font-size:0.7em; padding:3px 10px; border-radius:10px; font-weight:700; }
  .sc-badge.opt { background:#f0f2ff; color:var(--jelly-blue); }
  .sc-badge.inst { background:#e8f5e9; color:var(--jelly-green); }

  /* === CENTER: JELLY MAP === */
  .map-wrap { flex:1; position:relative; overflow:hidden; background:linear-gradient(180deg,#e8f0fe 0%,#f0f4ff 30%,#f5f7ff 100%); }
  
  /* Isometric floor grid */
  .map-floor { position:absolute; inset:0; }
  .map-svg { width:100%; height:100%; }

  /* Rooms on map */
  .room-area { position:absolute; border-radius:24px; transition:all 0.3s; }
  .room-area .room-tag { position:absolute; top:-10px; left:20px; padding:4px 14px; border-radius:10px; font-size:0.75em; font-weight:900; color:white; white-space:nowrap; }

  /* Agent avatars on map */
  .agent-bubble { position:absolute; cursor:pointer; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index:5; }
  .agent-bubble:hover { transform:scale(1.15); z-index:20; }
  .agent-bubble.selected { transform:scale(1.2); z-index:25; }
  .agent-bubble .ab-body { width:72px; height:72px; border-radius:22px; display:flex; align-items:center; justify-content:center; font-size:2em; position:relative; box-shadow:0 6px 20px rgba(0,0,0,0.1); border:3px solid white; }
  .agent-bubble .ab-shadow { width:56px; height:12px; border-radius:50%; background:rgba(0,0,0,0.08); position:absolute; bottom:-8px; left:50%; transform:translateX(-50%); }
  .agent-bubble .ab-name { text-align:center; font-size:0.7em; font-weight:900; color:var(--jelly-text); margin-top:4px; white-space:nowrap; }
  .agent-bubble .ab-status { position:absolute; top:-4px; right:-4px; width:22px; height:22px; border-radius:50%; border:3px solid white; display:flex; align-items:center; justify-content:center; font-size:0.55em; }
  .ab-status.working { background:var(--jelly-green); }
  .ab-status.alert { background:var(--jelly-red); animation:jelly-pulse 1s infinite; }
  .ab-status.idle { background:var(--jelly-dim); }

  /* Status speech bubble */
  .speech-bubble { position:absolute; bottom:100%; left:50%; transform:translateX(-50%); background:white; border-radius:12px; padding:4px 10px; font-size:0.65em; font-weight:700; color:var(--jelly-text); white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,0.1); margin-bottom:8px; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .speech-bubble::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:6px solid transparent; border-top-color:white; }
  .agent-bubble:hover .speech-bubble, .agent-bubble.selected .speech-bubble { opacity:1; }

  /* Level badge */
  .ab-level { position:absolute; bottom:-2px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#ffd700,#ffaa00); color:#7a5800; font-size:0.6em; font-weight:900; padding:2px 8px; border-radius:8px; border:2px solid white; white-space:nowrap; }

  /* Floating particles */
  .particle { position:absolute; pointer-events:none; animation:float-up 3s ease-out forwards; font-size:0.9em; }
  @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(0.6)} }
  @keyframes jelly-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
  @keyframes jelly-bounce { 0%{transform:translateY(0)} 50%{transform:translateY(-8px)} 100%{transform:translateY(0)} }
  @keyframes jelly-pop { 0%{transform:scale(0)} 50%{transform:scale(1.2)} 100%{transform:scale(1)} }

  /* === RIGHT PANEL === */
  .panel-right { width:320px; background:white; box-shadow:-4px 0 20px var(--jelly-shadow); z-index:10; overflow-y:auto; }
  
  .detail-empty { height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--jelly-dim); }
  .detail-empty .de-emoji { font-size:4em; margin-bottom:16px; animation:jelly-bounce 2s infinite; }

  .agent-profile { text-align:center; padding:28px 20px 20px; position:relative; }
  .agent-profile::before { content:''; position:absolute; top:0; left:0; right:0; height:100px; border-radius:0 0 30px 30px; }
  .ap-avatar { font-size:4em; position:relative; z-index:1; filter:drop-shadow(0 6px 12px rgba(0,0,0,0.15)); animation:jelly-pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .ap-name { font-size:1.3em; font-weight:900; color:var(--jelly-text); margin-top:8px; }
  .ap-desc { font-size:0.8em; color:var(--jelly-dim); margin-top:4px; }
  .ap-level-badge { display:inline-flex; align-items:center; gap:4px; margin-top:10px; padding:6px 16px; border-radius:12px; background:linear-gradient(135deg,#fff5d4,#ffe082); font-size:0.85em; font-weight:900; color:#c49000; }

  .stat-cards { display:flex; gap:8px; padding:0 16px; margin-top:16px; }
  .stat-card { flex:1; background:#f8f9ff; border-radius:14px; padding:12px; text-align:center; }
  .stat-card .sc-val { font-size:1.4em; font-weight:900; }
  .stat-card .sc-label { font-size:0.7em; color:var(--jelly-dim); margin-top:2px; }
  .sc-val.good { color:var(--jelly-green); }
  .sc-val.warn { color:var(--jelly-orange); }
  .sc-val.bad { color:var(--jelly-red); }

  .detail-section { padding:16px 20px 8px; }
  .ds-title { font-size:0.75em; color:var(--jelly-dim); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }

  .kpi-row { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:#f8f9ff; border-radius:12px; margin-bottom:6px; font-size:0.85em; }
  .kpi-row b.good { color:var(--jelly-green); }
  .kpi-row b.warn { color:var(--jelly-orange); }

  .skill-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .skill-pill { padding:6px 14px; border-radius:12px; font-size:0.75em; font-weight:700; }

  .upgrade-btn { display:block; width:calc(100% - 40px); margin:12px 20px 20px; padding:14px; border:none; border-radius:16px; font-size:1em; font-weight:900; cursor:pointer; color:white; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .upgrade-btn:hover { transform:translateY(-3px) scale(1.02); }
  .upgrade-btn:active { transform:scale(0.97); }
  .upgrade-btn.can { background:linear-gradient(135deg,var(--jelly-purple),var(--jelly-blue)); box-shadow:0 6px 20px rgba(102,126,234,0.3); }
  .upgrade-btn.max { background:linear-gradient(135deg,var(--jelly-yellow),var(--jelly-orange)); }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:#ddd; border-radius:3px; }
</style>
</head>
<body>

<div class="topbar">

const SHOP_ITEMS = [
  { emoji:'🛒', name:'促销活动', desc:'大促策划/优惠券', cost:600, color:'red' },
  { emoji:'📱', name:'私域运营', desc:'微信社群/企微', cost:700, color:'green' },

let selectedSeatId = null;

// === RENDER MAP ===
function renderMap() {
  const map = document.getElementById('mapWrap');
  
  // Rooms
  ROOMS.forEach(r => {
    const el = document.createElement('div');
    el.className = 'room-area';
    el.style.cssText = `left:${r.x};top:${r.y};width:${r.w};height:${r.h};background:${r.bg};border:2px dashed ${r.border};`;
    el.innerHTML = `<div class="room-tag" style="background:${r.tagBg}">${r.label}</div>`;
    map.appendChild(el);
  });

  // Agents
  SEATS.forEach(s => {
    const c = COLORS[s.color] || PALETTE[0];
    const el = document.createElement('div');
    el.className = 'agent-bubble';
    el.id = `agent-${s.id}`;
    el.style.cssText = `left:${s.px}%;top:${s.py}%;`;
    el.innerHTML = `
      <div class="speech-bubble">${s.speech}</div>
      <div class="ab-body" style="background:${c.bg}">
        <span style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))">${s.emoji}</span>
        <div class="ab-status ${s.status}"></div>
      </div>
      <div class="ab-shadow"></div>
      <div class="ab-level">Lv.${s.level}</div>
      <div class="ab-name">${s.name}</div>
    `;
    el.addEventListener('click', () => selectAgent(s));
    
    // Bouncing animation with random delay
    el.style.animation = `jelly-bounce ${2 + Math.random()}s ease-in-out ${Math.random()*2}s infinite`;
    
    map.appendChild(el);
  });
}

// === PARTICLES ===
function spawnParticle(seatId) {
  const agent = document.getElementById(`agent-${seatId}`);
  if (!agent) return;
  const rect = agent.getBoundingClientRect();
  const mapRect = document.getElementById('mapWrap').getBoundingClientRect();
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = (rect.left - mapRect.left + rect.width/2 + (Math.random()-0.5)*30) + 'px';
  p.style.top = (rect.top - mapRect.top + (Math.random()-0.5)*20) + 'px';
  p.textContent = ['✨','⭐','💫','📈','⚡','✓'][Math.floor(Math.random()*6)];
  document.getElementById('mapWrap').appendChild(p);
  setTimeout(() => p.remove(), 3000);
}

setInterval(() => {
  SEATS.filter(s => s.status === 'working').forEach(s => {
    if (Math.random() < 0.15) spawnParticle(s.id);
  });
}, 1000);

// === SELECT AGENT ===
function selectAgent(s) {
  // Deselect old
  document.querySelectorAll('.agent-bubble.selected').forEach(el => el.classList.remove('selected'));
  // Select new
  selectedSeatId = s.id;
  document.getElementById(`agent-${s.id}`).classList.add('selected');
  renderDetail(s);
}

function renderDetail(s) {
  const c = COLORS[s.color] || PALETTE[0];
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="agent-profile" style="background:${c.light}">
      <div class="ap-avatar">${s.emoji}</div>
      <div class="ap-name">${s.name}</div>
      <div class="ap-desc">${s.desc}</div>
      <div class="ap-level-badge">⭐ Lv.${s.level} ${'★'.repeat(Math.min(s.level,5))}</div>
    </div>
    <div class="stat-cards">
      <div class="stat-card"><div class="sc-val ${s.energy>70?'good':s.energy>40?'warn':'bad'}">${s.energy}%</div><div class="sc-label">能量</div></div>
      <div class="stat-card"><div class="sc-val" style="color:#f39c12">⭐${s.cost}</div><div class="sc-label">月消耗</div></div>
      <div class="stat-card"><div class="sc-val">${s.status==='working'?'⚡':s.status==='alert'?'⚠️':'💤'}</div><div class="sc-label">${s.status==='working'?'工作中':s.status==='alert'?'告警':'空闲'}</div></div>
    </div>
    <div class="detail-section">
      <div class="ds-title">📊 KPI 实况</div>
      ${s.kpis.map(k => `<div class="kpi-row"><span>${k.n}</span><b class="${k.s}">${k.v}</b></div>`).join('')}
    </div>
    <div class="detail-section">
      <div class="ds-title">🛠️ 技能装备</div>
      <div class="skill-tags">${s.skills.map((sk,i) => `<span class="skill-pill" style="background:${PALETTE[i%PALETTE.length].pill};color:${PALETTE[i%PALETTE.length].text}">${sk}</span>`).join('')}</div>
    </div>
    <div class="detail-section" style="padding-bottom:4px">
      <div class="kpi-row"><span>类型</span><b>${s.required?'✅ 必选':'🔲 可选'}</b></div>
      <div class="kpi-row"><span>房间</span><b>${ROOMS.find(r=>r.id===s.room)?.label||''}</b></div>
    </div>
    ${s.level < 6 ?
      `<button class="upgrade-btn can" onclick="doUpgrade('${s.id}')">⬆️ 升级到 Lv.${s.level+1}</button>` :
      `<button class="upgrade-btn max">🏆 已满级！</button>`}
  `;
}

function doUpgrade(id) {
  const s = SEATS.find(s => s.id === id);
  if (!s || s.level >= 6) return;
  s.level++;
  // Celebration
  for (let i = 0; i < 30; i++) {
    setTimeout(() => spawnParticle(id), i * 50);
  }
  // Re-render
  const el = document.getElementById(`agent-${id}`);
  el.querySelector('.ab-level').textContent = `Lv.${s.level}`;
  renderDetail(s);
}

// === SHOP ===
function renderShop() {
  const el = document.getElementById('shopList');
  el.innerHTML = SHOP_ITEMS.map(item => {
    const c = COLORS[item.color] || PALETTE[0];
    return `
    <div class="shop-card" onclick="installFromShop('${item.name}')">
      <div class="sc-top">
        <div class="sc-avatar" style="background:${c.bg}">${item.emoji}</div>
        <div><div class="sc-name">${item.name}</div><div class="sc-desc">${item.desc}</div></div>
      </div>
      <div class="sc-bottom">
        <span class="sc-price">⭐ ${item.cost}/月</span>
        <span class="sc-badge opt">安装</span>
      </div>
    </div>`;
  }).join('');
}

function installFromShop(name) {
  const item = SHOP_ITEMS.find(i => i.name === name);
  if (!item) return;
  const newSeat = {
    id: 'new_'+Date.now(), name:item.name, emoji:item.emoji, room:'biz',
    px: 60+Math.random()*25, py: 35+Math.random()*15,
    color:item.color, level:1, energy:100, status:'idle', required:false,
    cost:item.cost, desc:item.desc, speech:'刚安装 🎉',
    kpis:[{n:'状态',v:'初始化',s:'warn'}], skills:['待配置'],
  };
  SEATS.push(newSeat);
  
  // Render on map
  const c = COLORS[newSeat.color] || PALETTE[0];
  const el = document.createElement('div');
  el.className = 'agent-bubble';
  el.id = `agent-${newSeat.id}`;
  el.style.cssText = `left:${newSeat.px}%;top:${newSeat.py}%;animation:jelly-pop 0.5s cubic-bezier(0.34,1.56,0.64,1);`;
  el.innerHTML = `
    <div class="speech-bubble">刚安装 🎉</div>
    <div class="ab-body" style="background:${c.bg}">
      <span style="filter:drop-shadow(0 2px 4px rgba(0,0,0,0.2))">${newSeat.emoji}</span>
      <div class="ab-status idle"></div>
    </div>
    <div class="ab-shadow"></div>
    <div class="ab-level">Lv.1</div>
    <div class="ab-name">${newSeat.name}</div>
  `;
  el.addEventListener('click', () => selectAgent(newSeat));
  document.getElementById('mapWrap').appendChild(el);
  
  // Celebration
  for (let i = 0; i < 20; i++) setTimeout(() => spawnParticle(newSeat.id), i*60);
  
  // Auto select
  setTimeout(() => selectAgent(newSeat), 300);
}

// === INIT ===
renderMap();
renderShop();
// Auto select one
setTimeout(() => selectAgent(SEATS[1]), 500);
</script>
</body>
</html>
